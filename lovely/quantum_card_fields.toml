# Mail-In Rebate
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
            context.other_card:get_id() == G.GAME.current_round.mail_card.id then'''
position = "at"
match_indent = false
payload = '''
            context.other_card:is_rank(G.GAME.current_round.mail_card.id) then''' # Todo : update together with reset_mail_rank()

# Hit the Road
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''context.other_card:get_id() == 11 and not context.blueprint then'''
position = "at"
match_indent = true
payload = '''context.other_card:is_rank("Jack") and not context.blueprint then'''

