# Even Steven and Odd Todd
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if self.ability.name == 'Even Steven' and
context.other_card:get_id() <= 10 and 
context.other_card:get_id() >= 0 and
context.other_card:get_id()%2 == 0
then
    return {
        mult = self.ability.extra,
        card = self
    }
end
if self.ability.name == 'Odd Todd' and
((context.other_card:get_id() <= 10 and 
context.other_card:get_id() >= 0 and
context.other_card:get_id()%2 == 1) or
(context.other_card:get_id() == 14))
then
    return {
        chips = self.ability.extra,
        card = self
    }
end
'''
position = "at"
match_indent = true
payload = '''
if self.ability.name == 'Even Steven' and
context.other_card:is_parity(0)
then
    return {
        mult = self.ability.extra,
        card = self
    }
end
if self.ability.name == 'Odd Todd' and
context.other_card:is_parity(1)
then
    return {
        chips = self.ability.extra,
        card = self
    }
end
'''

### Sticker ###
# card.lua : Card:calculate_perishable() : update logic
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if self.ability.perishable and self.ability.perish_tally > 0 then
    if self.ability.perish_tally == 1 then
        self.ability.perish_tally = 0
        card_eval_status_text(self, 'extra', nil, nil, nil, {message = localize('k_disabled_ex'),colour = G.C.FILTER, delay = 0.45})
        self:set_debuff()
    else
        self.ability.perish_tally = self.ability.perish_tally - 1
        card_eval_status_text(self, 'extra', nil, nil, nil, {message = localize{type='variable',key='a_remaining',vars={self.ability.perish_tally}},colour = G.C.FILTER, delay = 0.45})
    end
end'''
position = "at"
match_indent = true
payload = '''
local is_perishable = self:has_sticker("perishable", {bypass_debuff = true})
if is_perishable and self.ability.perish_tally and self.ability.perish_tally > 0 then
    if self.ability.perish_tally == 1 then
        self.ability.perish_tally = 0
        card_eval_status_text(self, 'extra', nil, nil, nil, {message = localize('k_disabled_ex'),colour = G.C.FILTER, delay = 0.45})
        self:set_debuff()
    else
        self.ability.perish_tally = self.ability.perish_tally - 1
        card_eval_status_text(self, 'extra', nil, nil, nil, {message = localize{type='variable',key='a_remaining',vars={self.ability.perish_tally}},colour = G.C.FILTER, delay = 0.45})
    end
elseif is_perishable then
    self.ability.perish_tally = 4
    card_eval_status_text(self, 'extra', nil, nil, nil, {message = localize{type='variable',key='a_remaining',vars={self.ability.perish_tally}},colour = G.C.FILTER, delay = 0.45})
else
    self.ability.perish_tally = nil
end'''

