[manifest]
version = "1.0.0"
dump_lua = true
priority = -10


### Seal ###

# functions/state_events.lua : G.FUNCS.discard_cards_from_highlighted() : Remove (now) duplicate Seal calc
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''G.hand.highlighted[i]:calculate_seal({discard = true})'''
position = "at"
match_indent = true
payload = ''''''


### Suit ###

# blind.lua : Blind:debuff_card() : update card:is_suit() check and add card:is_rank() check
[[patches]]
[patches.pattern]
target = "blind.lua"
pattern = '''if self.debuff.suit and card:is_suit(self.debuff.suit, true) then'''
position = "at"
match_indent = true
payload = '''if self.debuff.suit and card:is_suit(self.debuff.suit, {bypass_debuff = true}) then'''
[[patches]]
[patches.pattern]
target = "blind.lua"
pattern = '''if self.debuff.value and self.debuff.value == card.base.value then'''
position = "at"
match_indent = true
payload = '''if self.debuff.value and card:is_rank(self.debuff.value) then'''

