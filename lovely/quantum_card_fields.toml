[manifest]
version = "1.0.0"
dump_lua = true
priority = -10

### Suit ###

# Blackboard
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''if v:is_suit('Clubs', nil, true) or v:is_suit('Spades', nil, true) then'''
position = "at"
match_indent = false
payload = '''if v:is_suits({Clubs = true, Spades = true}) then'''

