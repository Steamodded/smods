# Card:get_p_dollars
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "function Card:get_p_dollars()"
position = "at"
match_indent = true
payload = "function Card:get_p_dollars(context)"

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''end
if ret > 0 then
    G.GAME.dollar_buffer = (G.GAME.dollar_buffer or 0) + ret'''
position = "at"
match_indent = true
payload = '''elseif self.ability.p_dollars < 0 then
    ret = ret + self.ability.p_dollars
end
if context then
    local calc = SMODS.calculate_perma_bonuses(self, context, 'p_dollars')
    for k,v in pairs(calc) do
        if k == 'p_dollars' and v[k] and v[k] > 0 then
            ret = SMODS.stack_perma_bonus(k, v, {[k] = ret})
        end
    end
else ret = ret + ((not self.ability.extra_enhancement and self.ability.perma_p_dollars) or 0) end
-- TARGET: get_p_dollars
if ret ~= 0 then
    G.GAME.dollar_buffer = (G.GAME.dollar_buffer or 0) + ret'''

# Card:get_end_of_round_effect
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if self.ability.h_dollars > 0 then
    ret.h_dollars = self.ability.h_dollars
    ret.card = self
end
'''
position = "at"
match_indent = true
payload = '''
local h_dollars = self:get_h_dollars()
if h_dollars ~= 0 then
    ret.h_dollars = h_dollars
    ret.card = self
end
'''