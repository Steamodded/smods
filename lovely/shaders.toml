[manifest]
version = "1.0.0"
dump_lua = true
priority = -10

# Shader patching
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''self.SHADERS[shader_name] = love.graphics.newShader("resources/shaders/"..filename)'''
position = "at"
payload = '''
local shader = "resources/shaders/"..filename
local lovely = require "lovely"
shader = assert(lovely.apply_patches(filename, love.filesystem.read(shader)))
self.SHADERS[shader_name] = love.graphics.newShader(shader)
'''
match_indent = true

# DynaText shader parameter
# DynaText:init
[[patches]]
[patches.pattern]
target = "engine/text.lua"
pattern = '''self.config = config'''
position = "after"
payload = '''self.shaders = config.shaders'''
match_indent = true

# Mark DynaText:draw as overridden
[[patches]]
[patches.pattern]
target = "engine/text.lua"
pattern = '''function DynaText:draw()'''
position = "before"
payload = '''-- overridden by SMODS in src/overrides.lua'''
match_indent = true

# Mark UIElement:draw_self as overridden
[[patches]]
[patches.pattern]
target = "engine/ui.lua"
pattern = '''function UIElement:draw_self()'''
position = "before"
payload = '''-- overridden by SMODS in src/overrides.lua'''
match_indent = true