[manifest]
version = "1.0.0"
dump_lua = true
priority = -10

# Shader patching
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''self.SHADERS[shader_name] = love.graphics.newShader("resources/shaders/"..filename)'''
position = "at"
payload = '''
local shader = "resources/shaders/"..filename
local lovely = require "lovely"
shader = assert(lovely.apply_patches(filename, love.filesystem.read(shader)))
self.SHADERS[shader_name] = love.graphics.newShader(shader)
'''
match_indent = true

# DynaText shader parameter
# DynaText:init
[[patches]]
[patches.pattern]
target = "engine/text.lua"
pattern = '''self.config = config'''
position = "after"
payload = '''self.shaders = config.shaders'''
match_indent = true

# delegate CRT shader to SMODS.ScreenShader
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = 'if (not G.recording_mode or G.video_control )and true then'
position = 'at'
payload = 'if false then'
match_indent = true